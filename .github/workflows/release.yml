name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset: prompt-guard-darwin-arm64
            tarball: prompt-guard-darwin-arm64.tar.gz
            bottle_tags: "arm64_sequoia arm64_sonoma arm64_ventura"
          - goos: darwin
            goarch: amd64
            asset: prompt-guard-darwin-amd64
            tarball: prompt-guard-darwin-amd64.tar.gz
            bottle_tags: "sequoia sonoma ventura"
          - goos: linux
            goarch: arm64
            asset: prompt-guard-linux-arm64
            tarball: prompt-guard-linux-arm64.tar.gz
            bottle_tags: "aarch64_linux"
          - goos: linux
            goarch: amd64
            asset: prompt-guard-linux-amd64
            tarball: prompt-guard-linux-amd64.tar.gz
            bottle_tags: "x86_64_linux"
          - goos: windows
            goarch: amd64
            asset: prompt-guard-windows-amd64.exe
            tarball: ""
            bottle_tags: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.asset }} .

      - name: Package source tarball (macOS / Linux)
        if: matrix.tarball != ''
        run: |
          cp ${{ matrix.asset }} prompt-guard
          tar czf ${{ matrix.tarball }} prompt-guard
          sha256sum ${{ matrix.tarball }} > ${{ matrix.tarball }}.sha256
          rm prompt-guard

      - name: Create Homebrew bottles (macOS / Linux)
        if: matrix.bottle_tags != ''
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          for tag in ${{ matrix.bottle_tags }}; do
            mkdir -p "btl/prompt-guard/${VER}/bin"
            cp ${{ matrix.asset }} "btl/prompt-guard/${VER}/bin/prompt-guard"
            BOTTLE="prompt-guard--${VER}.${tag}.bottle.tar.gz"
            tar czf "${BOTTLE}" -C btl prompt-guard
            sha256sum "${BOTTLE}" > "${BOTTLE}.sha256"
            rm -rf btl
          done

      - name: Checksum (Windows)
        if: matrix.tarball == ''
        run: sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        if: matrix.tarball != ''
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.tarball }}
            ${{ matrix.tarball }}.sha256
            prompt-guard--*.bottle.tar.gz
            prompt-guard--*.bottle.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        if: matrix.tarball == ''
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prompt-guard-*.tar.gz
            prompt-guard-*.tar.gz.sha256
            prompt-guard--*.bottle.tar.gz
            prompt-guard--*.bottle.tar.gz.sha256
            prompt-guard-windows-amd64.exe
            prompt-guard-windows-amd64.exe.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s
        id: shas
        run: |
          echo "arm64=$(awk '{print $1}' prompt-guard-darwin-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "amd64=$(awk '{print $1}' prompt-guard-darwin-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(awk '{print $1}' prompt-guard-linux-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(awk '{print $1}' prompt-guard-linux-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT

      - name: Build bottle sha256 lines
        id: bottles
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          LINES=""
          for f in prompt-guard--${VER}.*.bottle.tar.gz.sha256; do
            [ -f "$f" ] || continue
            sha=$(awk '{print $1}' "$f")
            tag=$(echo "$f" | sed "s/prompt-guard--${VER}\.\(.*\)\.bottle\.tar\.gz\.sha256/\1/")
            LINES="${LINES}      sha256 cellar: :any_skip_relocation, ${tag}: \"${sha}\"\n"
          done
          # Store as multiline output
          {
            echo "lines<<EOF"
            printf "%b" "$LINES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: chaudharydeepak/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.shas.outputs.amd64 }}
          SHA_LINUX_ARM64: ${{ steps.shas.outputs.linux_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.shas.outputs.linux_amd64 }}
          BOTTLE_LINES: ${{ steps.bottles.outputs.lines }}
        run: |
          VER="${VERSION#v}"
          cat > homebrew-tap/Formula/prompt-guard.rb << FORMULA
          class PromptGuard < Formula
            desc "Local HTTPS MITM proxy that inspects, redacts, or blocks sensitive data sent to AI coding assistants"
            homepage "https://github.com/chaudharydeepak/prompt-guard"
            version "${VER}"
            license "MIT"

            # Bottles are pre-built binaries — no compiler or Xcode CLT required.
            bottle do
              root_url "https://github.com/chaudharydeepak/prompt-guard/releases/download/${VERSION}"
          ${BOTTLE_LINES}    end

            # Fallback source build for OS versions not covered by a bottle.
            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/chaudharydeepak/prompt-guard/releases/download/${VERSION}/prompt-guard-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/chaudharydeepak/prompt-guard/releases/download/${VERSION}/prompt-guard-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/chaudharydeepak/prompt-guard/releases/download/${VERSION}/prompt-guard-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/chaudharydeepak/prompt-guard/releases/download/${VERSION}/prompt-guard-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "prompt-guard"
            end

            service do
              run [opt_bin/"prompt-guard"]
              keep_alive true
              log_path var/"log/prompt-guard.log"
              error_log_path var/"log/prompt-guard.log"
            end

            def caveats
              <<~EOS
                Prompt Guard intercepts AI coding assistant traffic (Claude Code, Copilot, etc.)
                and lets you inspect, redact, or block sensitive data before it leaves your machine.

                ── Quick start ──────────────────────────────────────────────────────────
                1. Start the proxy (runs on :8080, dashboard on :7778):
                     prompt-guard
                   Or run it as a background service:
                     brew services start prompt-guard

                2. Point your shell at the proxy (add to ~/.zshrc or ~/.bashrc):
                     export HTTP_PROXY=http://localhost:8080
                     export HTTPS_PROXY=http://localhost:8080
                     export NO_PROXY=localhost,127.0.0.1

                3. Open the dashboard:
                     http://localhost:7778

                ── CA certificate (browser inspection only) ─────────────────────────────
                CLI tools (Claude Code, Copilot) work without trusting the cert.
                For browser (Chrome/Safari) inspection, trust the generated CA:

                  sudo security add-trusted-cert -d -r trustRoot \\
                    -k /Library/Keychains/System.keychain \\
                    ~/.prompt-guard/ca.crt

                The cert is auto-generated on first run at ~/.prompt-guard/ca.crt
                ─────────────────────────────────────────────────────────────────────────
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/prompt-guard --version")
            end
          end
          FORMULA

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/prompt-guard.rb
          git commit -m "prompt-guard ${{ github.ref_name }}"
          git push
